services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: document-webapp-backend
    environment:
      - PORT=4000
      - DB_PATH=/data/data.sqlite
    volumes:
      - backend_data:/data
      - backend_uploads:/app/uploads
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: document-webapp-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend_data:
  backend_uploads:
